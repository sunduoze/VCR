  release:
    needs: [build-windows]
    runs-on: ubuntu-latest
    # 支持 v* 和 V* 标签，同时避免非标签触发
    if: github.ref_type == 'tag' && (startsWith(github.ref_name, 'v') || startsWith(github.ref_name, 'V'))
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Download Windows Artifact
        uses: actions/download-artifact@v5
        with:
          name: vcr-windows-release
          path: artifacts/windows

      - name: Prepare Release Assets
        run: |
          # 列出下载的产物，确认结构
          echo "=== Windows artifact contents ==="
          find artifacts/windows -type f | head -50
          
          # 根据 tag 名称生成带版本的 zip 文件名
          cd artifacts/windows
          ZIP_NAME="vcr-windows-${{ github.ref_name }}.zip"
          zip -r "../$ZIP_NAME" . -x "*.pdb"
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV
          cd ../..
          
          echo "=== $ZIP_NAME size ==="
          ls -lh "artifacts/$ZIP_NAME"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/${{ env.ZIP_NAME }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
