name: Flutter CI

on:
  push:
    branches: [ "main" ]
    tags: [ '[vV]*' ]                # 同时匹配 v* 和 V* 标签
    paths:
      - ".github/workflows/flutter_ci.yaml"
      - "lib/**"
      - "pubspec.yaml"
      - "rust/**"
      - "Cargo.toml"
      - "Cargo.lock"
  pull_request:
    branches: [ "main" ]

env:
  FLUTTER_VERSION: "3.41.7"
  RUST_VERSION: "1.95.0"

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install Flutter (${{ env.FLUTTER_VERSION }})
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install Rust (${{ env.RUST_VERSION }})
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: x86_64-pc-windows-msvc

      - name: Add rustfmt
        run: rustup component add rustfmt

      - name: Cache Cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Enable Windows Desktop
        run: |
          git config --system core.longpaths true
          flutter config --enable-windows-desktop

      - name: Generate Flutter Rust Bridge code
        run: |
          cargo install flutter_rust_bridge_codegen --version 2.12.0
          cargo install cargo-expand --locked
          flutter_rust_bridge_codegen generate --config-file flutter_rust_bridge.yaml

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Run analyze
        run: flutter analyze lib/

      - name: Build Rust DLL (explicit, for CI reliability)
        working-directory: rust
        run: cargo build --release

      - name: Build Flutter Windows Release
        run: flutter build windows --release

      - name: Copy Rust DLL to Release (fallback)
        shell: pwsh
        run: |
          $src = "rust/target/release/vcr_lib.dll"
          $dst = "build/windows/x64/runner/Release/vcr_lib.dll"
          if (Test-Path $src) {
            Copy-Item $src $dst -Force
            Write-Host "vcr_lib.dll copied to Release dir"
          } else {
            Write-Host "WARNING: $src not found"
            Get-ChildItem -Recurse -Filter "*.dll" -Path rust/target/ | Select-Object FullName, Length
          }

      - name: Verify Release assets
        shell: pwsh
        run: |
          Write-Host "=== Release directory contents ==="
          Get-ChildItem build/windows/x64/runner/Release/ -Filter "*.dll" | Select-Object Name, Length
          if (-not (Test-Path build/windows/x64/runner/Release/vcr_lib.dll)) {
            Write-Host "ERROR: vcr_lib.dll is missing!"
            exit 1
          }
          Write-Host "vcr_lib.dll verified OK"

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v5
        with:
          name: vcr-windows-release
          path: build/windows/x64/runner/Release/
          retention-days: 30

